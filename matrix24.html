<script>
(() => {
"use strict";

const DB_BASE = "https://kwexaict-default-rtdb.firebaseio.com";
const STORAGE_LICENSE = "rfx_license_saved";
const STORAGE_DEVICE = "rfx_device_id";
const CHECK_INTERVAL_MS = 2000;
const PAGE_KEY = "matrix24";

let liveCheckTimer = null;
let activeLicenseKey = null;
let isBlocked = false;

function getDeviceId(){
    let id = localStorage.getItem(STORAGE_DEVICE);
    if(!id){
        id = "RFX-" + Math.random().toString(36).slice(2,10).toUpperCase();
        localStorage.setItem(STORAGE_DEVICE,id);
    }
    return id;
}

const DEVICE_ID = getDeviceId();

function licenseUrl(key){
    return `${DB_BASE}/licenses/${encodeURIComponent(String(key).toUpperCase())}.json?ts=${Date.now()}`;
}

async function fetchLicense(key){
    const res = await fetch(licenseUrl(key), {
        cache: "no-store",
        headers: {"Cache-Control":"no-cache","Pragma":"no-cache"}
    });
    if(!res.ok) throw new Error("NET");
    return await res.json();
}

function pageAllowed(data){
    if(!data.allowedPages) return true;
    return data.allowedPages[PAGE_KEY] === true;
}

function isLicenseValid(data){
    if(!data) return {ok:false, reason:"کلیلەکە هەڵەیە یان نەدۆزرایەوە"};
    if(data.active === false || data.status === "stopped" || data.status === "blocked") return {ok:false, reason:"ئەم کلیلە ڕاگیراوە"};
    if(!(data.deviceId === DEVICE_ID || data.deviceId === "ALL")) return {ok:false, reason:"ئەم کلیلە بۆ ئەم مۆبایلە نییە"};
    if(data.expiry && new Date() > new Date(data.expiry)) return {ok:false, reason:"ماوەی ئەم کلیلە تەواو بووە"};
    if(!pageAllowed(data)) return {ok:false, reason:"ڕێگەپێدانی ئەم نەخشەیەت نییە"};
    return {ok:true, reason:""};
}

function blockAccess(msg){
    if(isBlocked) return;
    isBlocked = true;
    if(liveCheckTimer) clearInterval(liveCheckTimer);
    try{localStorage.removeItem(STORAGE_LICENSE)}catch(e){}

    document.body.innerHTML = `
        <div class="blocked-screen">
            <div class="blocked-card">
                <h2>🚫 Access Stopped</h2>
                <p>${msg || "Access stopped"}</p>
                <p style="font-size:12px;color:#888;">Device ID: ${DEVICE_ID}</p>
            </div>
        </div>
    `;

    setTimeout(() => {
        window.location.href = "index.html";
    }, 1500);
}

async function verifyNow(){
    const key = localStorage.getItem(STORAGE_LICENSE);
    if(!key){
        window.location.href = "index.html";
        return false;
    }

    try{
        const data = await fetchLicense(key);
        const result = isLicenseValid(data);
        if(!result.ok){
            blockAccess(result.reason);
            return false;
        }
        activeLicenseKey = key;
        return true;
    }catch(e){
        return true;
    }
}

function startLiveCheck(){
    if(liveCheckTimer) clearInterval(liveCheckTimer);

    liveCheckTimer = setInterval(async () => {
        if(!activeLicenseKey || isBlocked) return;

        try{
            const data = await fetchLicense(activeLicenseKey);
            const result = isLicenseValid(data);
            if(!result.ok) blockAccess(result.reason);
        }catch(e){}
    }, CHECK_INTERVAL_MS);
}

window.RFX_SECURITY_READY = verifyNow().then(ok => {
    if(ok) startLiveCheck();
    return ok;
});
})();
</script>

window.isTimePriceSquared = function(price, base, timeAngle){
    if(price <= 0) return false;
    const priceAngle = Math.abs(Math.sqrt(price) - Math.sqrt(base)) * 180;
    let diff = Math.abs((priceAngle % 360) - timeAngle);
    if(diff > 180) diff = 360 - diff;
    return diff <= 3 || Math.abs(diff - 45) <= 3 || Math.abs(diff - 90) <= 3 || Math.abs(diff - 180) <= 3;
};

window.drawSq24 = function(){
    const canvas = $("sq24Canvas");
    if(!canvas) return;

    const ctx = canvas.getContext("2d");
    const CANVAS_SIZE = 5600;
    canvas.width = canvas.height = CANVAS_SIZE;
    canvas.style.width = CANVAS_SIZE + "px";
    canvas.style.height = CANVAS_SIZE + "px";

    const cx = CANVAS_SIZE / 2, cy = CANVAS_SIZE / 2;
    const base = parseFloat($("sq24BasePrice").value) || 0;
    const stepVal = parseFloat($("sq24StepValue").value) || 1;
    const trendDir = $("sq24TrendDir").value;
    const manualTimeInput = $("sq24ManualTime").value;
    const size = 24, rGrid = 1900, rClock = 1980;
    const goldenHours = [10,11,15,16,18];

    let now = new Date();
    let h = now.getHours();
    let m = now.getMinutes();
    let isManual = false;

    if(manualTimeInput){
        h = parseInt(manualTimeInput.split(":")[0]) || 0;
        m = parseInt(manualTimeInput.split(":")[1]) || 0;
        isManual = true;
    }

    const liveAngleDeg = ((h + m / 60) / 24) * 360;
    const liveRad = (liveAngleDeg - 90) * Math.PI / 180;
    const activeColHour = h === 0 ? 24 : h;
    const themeColor = isManual ? "#ff3399" : "#00ffcc";

    ctx.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE);

    ctx.beginPath();
    ctx.arc(cx,cy,rClock,0,2*Math.PI);
    ctx.lineWidth = 6;
    ctx.strokeStyle = "rgba(0,255,204,.4)";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx,cy,rClock - 20,0,2*Math.PI);
    ctx.lineWidth = 3;
    ctx.strokeStyle = "rgba(212,175,55,.3)";
    ctx.stroke();

    for(let a = 0; a < 360; a += 15){
        const rad = a * Math.PI / 180 - Math.PI / 2;
        const hourUnit = (a / 15 === 0) ? 24 : a / 15;
        const isGolden = goldenHours.includes(hourUnit);
        const isActiveHour = hourUnit === activeColHour;
        const strokeCol = isActiveHour ? themeColor : (isGolden ? "#d4af37" : "rgba(255,255,255,.7)");

        ctx.lineWidth = isActiveHour ? 12 : (isGolden ? 10 : 5);
        ctx.strokeStyle = strokeCol;
        ctx.beginPath();
        ctx.moveTo(cx + (rClock - 35) * Math.cos(rad), cy + (rClock - 35) * Math.sin(rad));
        ctx.lineTo(cx + (rClock + 35) * Math.cos(rad), cy + (rClock + 35) * Math.sin(rad));
        ctx.stroke();

        ctx.fillStyle = isActiveHour ? themeColor : (isGolden ? "#d4af37" : "rgba(255,255,255,.6)");
        ctx.font = isActiveHour ? "bold 85px monospace" : (isGolden ? "bold 75px monospace" : "bold 55px monospace");
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        if(isActiveHour || isGolden){
            ctx.shadowBlur = 20;
            ctx.shadowColor = ctx.fillStyle;
        }

        ctx.fillText((isGolden && !isActiveHour ? "⭐ " : "") + hourUnit + "H", cx + (rClock + 110) * Math.cos(rad), cy + (rClock + 110) * Math.sin(rad));
        ctx.shadowBlur = 0;
    }

    ctx.beginPath();
    ctx.moveTo(cx + (rClock - 40) * Math.cos(liveRad), cy + (rClock - 40) * Math.sin(liveRad));
    ctx.lineTo(cx + (rClock + 40) * Math.cos(liveRad), cy + (rClock + 40) * Math.sin(liveRad));
    ctx.lineWidth = 10;
    ctx.strokeStyle = "#fff";
    ctx.shadowBlur = 20;
    ctx.shadowColor = themeColor;
    ctx.stroke();
    ctx.shadowBlur = 0;

    const cellSize = (rGrid * 1.35) / size;
    const startX = cx - (size * cellSize) / 2;
    const startY = cy - (size * cellSize) / 2;

    for(let row = 0; row < size; row++){
        for(let col = 0; col < size; col++){
            const colHour = col + 1;
            let val;

            if(trendDir === "up"){
                val = parseFloat((base + ((23 - row) * size + col) * stepVal).toFixed(2));
            }else{
                val = parseFloat((base - (row * size + col) * stepVal).toFixed(2));
            }

            const x = startX + col * cellSize;
            const y = startY + row * cellSize;
            const isActiveCol = colHour === activeColHour;
            const isGolden = goldenHours.includes(colHour);
            let isSquaring = false;

            if(val > 0){
                const priceAngle = Math.abs(Math.sqrt(val) - Math.sqrt(base)) * 180;
                let diff = Math.abs((priceAngle % 360) - ((colHour * 15) % 360));
                if(diff > 180) diff = 360 - diff;
                isSquaring = isActiveCol && (diff <= 3 || Math.abs(diff - 45) <= 3 || Math.abs(diff - 90) <= 3 || Math.abs(diff - 180) <= 3);
            }

            const cellW = cellSize - 6;
            const cellGrad = ctx.createLinearGradient(x,y,x+cellW,y+cellW);

            if(isSquaring){
                cellGrad.addColorStop(0,themeColor);
                cellGrad.addColorStop(1,"#006666");
            }else if(isGolden){
                cellGrad.addColorStop(0,"#262000");
                cellGrad.addColorStop(1,"#1a1500");
            }else{
                cellGrad.addColorStop(0,"#16161f");
                cellGrad.addColorStop(1,"#0a0a0f");
            }

            ctx.fillStyle = cellGrad;
            ctx.fillRect(x + 3, y + 3, cellW, cellW);

            ctx.strokeStyle = isSquaring ? "#fff" : (isActiveCol ? "rgba(0,255,204,.4)" : (isGolden ? "rgba(212,175,55,.4)" : "rgba(255,255,255,.08)"));
            ctx.lineWidth = isSquaring ? 2 : 1;
            ctx.strokeRect(x + 3, y + 3, cellW, cellW);

            ctx.fillStyle = isSquaring ? "#000" : (isActiveCol ? "#fff" : (isGolden ? "#ccc" : "#778"));
            ctx.font = isSquaring ? `bold ${cellW * .4}px monospace` : `bold ${cellW * .3}px monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(val, x + cellSize / 2, y + cellSize / 2 + (cellW * .1));
        }
    }

    const centerText = currentLang === "ku" ? "سەنتەر" : (currentLang === "ar" ? "المركز" : "Center");

    ctx.beginPath();
    ctx.arc(cx,cy,220,0,2*Math.PI);
    ctx.fillStyle = "#05050a";
    ctx.fill();
    ctx.strokeStyle = themeColor;
    ctx.lineWidth = 5;
    ctx.stroke();

    ctx.fillStyle = "#fff";
    ctx.font = "bold 35px Tahoma";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(centerText,cx,cy - 45);

    ctx.fillStyle = themeColor;
    ctx.font = "bold 75px monospace";
    ctx.shadowBlur = 20;
    ctx.shadowColor = themeColor;
    ctx.fillText(base,cx,cy + 30);
    ctx.shadowBlur = 0;
};

function initBotDrag(){
    const botBtn = $("rebar-bot-btn");
    if(!botBtn) return;

    botBtn.addEventListener("mousedown", dragBotStart);
    document.addEventListener("mousemove", dragBotMove);
    document.addEventListener("mouseup", dragBotEnd);

    botBtn.addEventListener("touchstart", dragBotStart, {passive:false});
    document.addEventListener("touchmove", dragBotMove, {passive:false});
    document.addEventListener("touchend", dragBotEnd);
}

function dragBotStart(e){
    if(e.type === "touchstart"){
        botStartX = e.touches[0].clientX;
        botStartY = e.touches[0].clientY;
    }else{
        botStartX = e.clientX;
        botStartY = e.clientY;
    }

    const botBtn = $("rebar-bot-btn");
    initialBotX = botBtn.offsetLeft;
    initialBotY = botBtn.offsetTop;
    isDraggingBot = true;
}

function dragBotMove(e){
    if(!isDraggingBot) return;

    let currentX, currentY;

    if(e.type === "touchmove"){
        currentX = e.touches[0].clientX;
        currentY = e.touches[0].clientY;
        e.preventDefault();
    }else{
        currentX = e.clientX;
        currentY = e.clientY;
    }

    const botBtn = $("rebar-bot-btn");
    botBtn.style.left = (initialBotX + (currentX - botStartX)) + "px";
    botBtn.style.top = (initialBotY + (currentY - botStartY)) + "px";
    botBtn.style.bottom = "auto";
    botBtn.style.right = "auto";
}

function dragBotEnd(e){
    if(!isDraggingBot) return;
    isDraggingBot = false;

    const finalX = e.type === "touchend" ? e.changedTouches[0].clientX : e.clientX;
    const finalY = e.type === "touchend" ? e.changedTouches[0].clientY : e.clientY;

    if(Math.abs(finalX - botStartX) < 10 && Math.abs(finalY - botStartY) < 10){
        window.openBot();
    }
}

window.updateBotTime = function(){
    let h = new Date().getHours();
    const manual = $("sq24ManualTime").value;

    if(manual) h = parseInt(manual.split(":")[0]) || 0;

    const t = lexicon[currentLang] || lexicon.ku;
    $("bot-greeting").innerHTML = t.bot_greet(h === 0 ? 24 : h);
};

window.openBot = function(){
    window.updateBotTime();
    $("bot-modal").style.display = "block";
    $("bot-results").style.display = "none";
    $("botPriceInput").value = "";
};

window.closeBot = function(){
    $("bot-modal").style.display = "none";
};

window.generateMatrixSignal = function(){
    const p = parseFloat($("botPriceInput").value);
    const t = lexicon[currentLang] || lexicon.ku;

    if(!p || p <= 0){
        alert(t.bot_err);
        return;
    }

    const base = parseFloat($("sq24BasePrice").value) || 0;
    const stepVal = parseFloat($("sq24StepValue").value) || 1;
    const trendDir = $("sq24TrendDir").value;

    let h = new Date().getHours();
    const manual = $("sq24ManualTime").value;
    if(manual) h = parseInt(manual.split(":")[0]) || 0;

    const targetHour = h === 0 ? 24 : h;
    const col = targetHour - 1;

    let nFloat;

    if(trendDir === "up"){
        nFloat = (p - base - col * stepVal) / (24 * stepVal);
    }else{
        nFloat = (base - p - col * stepVal) / (24 * stepVal);
    }

    let n1 = Math.floor(nFloat);
    let n2 = Math.ceil(nFloat);
    if(n1 === n2) n2 = n1 + 1;

    let val1, val2;

    if(trendDir === "up"){
        val1 = base + (n1 * 24 + col) * stepVal;
        val2 = base + (n2 * 24 + col) * stepVal;
    }else{
        val1 = base - (n1 * 24 + col) * stepVal;
        val2 = base - (n2 * 24 + col) * stepVal;
    }

    const gridBelow = parseFloat(Math.min(val1,val2).toFixed(2));
    const gridAbove = parseFloat(Math.max(val1,val2).toFixed(2));
    const dist = gridAbove - gridBelow;

    const b1 = parseFloat((gridBelow + dist * .25).toFixed(2));
    const b2 = parseFloat((gridBelow + dist * .50).toFixed(2));
    const b3 = parseFloat((gridBelow + dist * .75).toFixed(2));
    const b4 = gridAbove;

    const s1 = parseFloat((gridAbove - dist * .25).toFixed(2));
    const s2 = parseFloat((gridAbove - dist * .50).toFixed(2));
    const s3 = parseFloat((gridAbove - dist * .75).toFixed(2));
    const s4 = gridBelow;

    const slOffset = parseFloat((stepVal * 1.5).toFixed(2));
    const buySL = parseFloat((gridBelow - slOffset).toFixed(2));
    const sellSL = parseFloat((gridAbove + slOffset).toFixed(2));

    $("bot-status").innerHTML = `
        ${t.bot_res_title(targetHour)}
        <span style="color:var(--neon-gold);font-size:18px;display:inline-block;margin-top:5px;">[ ${gridBelow} ] — [ ${gridAbove} ]</span>
    `;

    $("buyBox").innerHTML = `
        ${t.bot_buy_title}
        ${t.bot_buy_entry(gridBelow)}
        ${t.bot_q1} <span class="target-val">${b1}</span><br>
        ${t.bot_q2} <span class="target-val">${b2}</span><br>
        ${t.bot_q3} <span class="target-val">${b3}</span><br>
        ${t.bot_q4} <span class="target-val">${b4}</span><br>
        ${t.bot_sl} <span style="color:#ff3333;font-weight:bold;font-family:monospace;">${buySL}</span>
    `;

    $("sellBox").innerHTML = `
        ${t.bot_sell_title}
        ${t.bot_sell_entry(gridAbove)}
        ${t.bot_q1} <span class="target-val">${s1}</span><br>
        ${t.bot_q2} <span class="target-val">${s2}</span><br>
        ${t.bot_q3} <span class="target-val">${s3}</span><br>
        ${t.bot_q4s} <span class="target-val">${s4}</span><br>
        ${t.bot_sl} <span style="color:#ff3333;font-weight:bold;font-family:monospace;">${sellSL}</span>
    `;

    $("bot-results").style.display = "block";
};

function upT(){
    $("zoom-layer").style.transform = `translate(${px}px, ${py}px) scale(${sc})`;
}

function getEP(e){
    return e.touches && e.touches.length > 0
        ? {x:e.touches[0].clientX, y:e.touches[0].clientY}
        : {x:e.clientX, y:e.clientY};
}

function initMapEvents(){
    const vM = $("viewport-maps");

    vM.addEventListener("mousedown", e => {
        if(e.target.closest(".sidebar") || e.target.closest(".header") || e.target.closest("#rebar-bot-btn") || e.target.closest("#bot-modal")) return;

        const p = getEP(e);
        dg = true;
        sx = p.x - px;
        sy = p.y - py;
        vM.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", e => {
        if(!dg) return;

        const p = getEP(e);
        px = p.x - sx;
        py = p.y - sy;
        upT();
    });

    window.addEventListener("mouseup", () => {
        dg = false;
        vM.style.cursor = "grab";
    });

    vM.addEventListener("wheel", e => {
        if(e.target.closest(".sidebar") || e.target.closest(".header") || e.target.closest("#bot-modal")) return;

        e.preventDefault();
        sc += e.deltaY * -0.001;
        sc = Math.min(Math.max(0.05, sc), 5);
        upT();
    }, {passive:false});

    vM.addEventListener("touchstart", e => {
        if(e.target.closest(".sidebar") || e.target.closest(".header") || e.target.closest("#rebar-bot-btn") || e.target.closest("#bot-modal")) return;

        if(e.touches.length === 2){
            dg = false;
            iDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }else{
            const p = getEP(e);
            dg = true;
            sx = p.x - px;
            sy = p.y - py;
        }
    }, {passive:false});

    vM.addEventListener("touchmove", e => {
        if(e.target.closest(".sidebar") || e.target.closest(".header") || e.target.closest("#rebar-bot-btn") || e.target.closest("#bot-modal")) return;

        if(e.touches.length === 2){
            e.preventDefault();

            const d = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );

            sc = Math.min(Math.max(0.05, sc * (d / iDist)), 5);
            iDist = d;
            upT();
        }else if(dg){
            e.preventDefault();

            const p = getEP(e);
            px = p.x - sx;
            py = p.y - sy;
            upT();
        }
    }, {passive:false});

    window.addEventListener("touchend", () => {
        dg = false;
    });
}

function initControls(){
    $("btn-menu").addEventListener("click", e => {
        e.stopPropagation();
        $("sidebar").classList.toggle("active");
    });

    $("btn-close-menu").addEventListener("click", () => {
        $("sidebar").classList.remove("active");
    });

    savedIds.forEach(id => {
        const el = $(id);
        if(!el) return;

        el.addEventListener("change", () => {
            saveSet();
            window.drawSq24();
            window.updateBotTime();
        });

        if(el.tagName === "INPUT"){
            el.addEventListener("input", () => {
                saveSet();
                window.drawSq24();
                window.updateBotTime();
            });
        }
    });

    document.addEventListener("contextmenu", e => e.preventDefault());

    document.addEventListener("keydown", e => {
        const key = String(e.key || "").toLowerCase();

        if(
            key === "f12" ||
            (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(key)) ||
            (e.ctrlKey && ["u","s"].includes(key))
        ){
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
    }, true);
}

document.addEventListener("DOMContentLoaded", async () => {
    const ok = window.RFX_SECURITY_READY ? await window.RFX_SECURITY_READY : true;
    if(!ok) return;

    applyLanguage();
    loadSet();
    initControls();
    initBotDrag();
    initMapEvents();

    px = 0;
    py = 0;
    upT();
    window.drawSq24();

    setInterval(() => {
        window.drawSq24();
    }, 60000);
});

})();
</script>
