<script>
(() => {
"use strict";

const DB_BASE = "https://kwexaict-default-rtdb.firebaseio.com";
const STORAGE_LICENSE = "rfx_license_saved";
const STORAGE_DEVICE = "rfx_device_id";
const CHECK_INTERVAL_MS = 2000;
const PAGE_KEY = "astro";

let liveCheckTimer = null;
let activeLicenseKey = null;
let isBlocked = false;

function getDeviceId(){
    let id = localStorage.getItem(STORAGE_DEVICE);
    if(!id){
        id = "RFX-" + Math.random().toString(36).slice(2,10).toUpperCase();
        localStorage.setItem(STORAGE_DEVICE,id);
    }
    return id;
}

const DEVICE_ID = getDeviceId();

function licenseUrl(key){
    return `${DB_BASE}/licenses/${encodeURIComponent(String(key).toUpperCase())}.json?ts=${Date.now()}`;
}

async function fetchLicense(key){
    const res = await fetch(licenseUrl(key), {
        cache: "no-store",
        headers: {"Cache-Control":"no-cache","Pragma":"no-cache"}
    });
    if(!res.ok) throw new Error("NET");
    return await res.json();
}

function pageAllowed(data){
    if(!data.allowedPages) return true;
    return data.allowedPages[PAGE_KEY] === true;
}

function isLicenseValid(data){
    if(!data) return {ok:false, reason:"کلیلەکە هەڵەیە یان نەدۆزرایەوە"};
    if(data.active === false || data.status === "stopped" || data.status === "blocked") return {ok:false, reason:"ئەم کلیلە ڕاگیراوە"};
    if(!(data.deviceId === DEVICE_ID || data.deviceId === "ALL")) return {ok:false, reason:"ئەم کلیلە بۆ ئەم مۆبایلە نییە"};
    if(data.expiry && new Date() > new Date(data.expiry)) return {ok:false, reason:"ماوەی ئەم کلیلە تەواو بووە"};
    if(!pageAllowed(data)) return {ok:false, reason:"ڕێگەپێدانی ئەم نەخشەیەت نییە"};
    return {ok:true, reason:""};
}

function blockAccess(msg){
    if(isBlocked) return;
    isBlocked = true;
    if(liveCheckTimer) clearInterval(liveCheckTimer);
    try{localStorage.removeItem(STORAGE_LICENSE)}catch(e){}

    document.body.innerHTML = `
        <div class="blocked-screen">
            <div class="blocked-card">
                <h2>🚫 Access Stopped</h2>
                <p>${msg || "Access stopped"}</p>
                <p style="font-size:12px;color:#888;">Device ID: ${DEVICE_ID}</p>
            </div>
        </div>
    `;

    setTimeout(() => {
        window.location.href = "index.html";
    }, 1500);
}

async function verifyNow(){
    const key = localStorage.getItem(STORAGE_LICENSE);
    if(!key){
        window.location.href = "index.html";
        return false;
    }

    try{
        const data = await fetchLicense(key);
        const result = isLicenseValid(data);
        if(!result.ok){
            blockAccess(result.reason);
            return false;
        }
        activeLicenseKey = key;
        return true;
    }catch(e){
        return true;
    }
}

function startLiveCheck(){
    if(liveCheckTimer) clearInterval(liveCheckTimer);

    liveCheckTimer = setInterval(async () => {
        if(!activeLicenseKey || isBlocked) return;

        try{
            const data = await fetchLicense(activeLicenseKey);
            const result = isLicenseValid(data);
            if(!result.ok) blockAccess(result.reason);
        }catch(e){}
    }, CHECK_INTERVAL_MS);
}

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("keydown", function(e){
    const key = String(e.key || "").toLowerCase();
    if(
        key === "f12" ||
        (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(key)) ||
        (e.ctrlKey && ["u","s"].includes(key))
    ){
        e.preventDefault();
        e.stopPropagation();
        return false;
    }
}, true);

window.RFX_SECURITY_READY = verifyNow().then(ok => {
    if(ok) startLiveCheck();
    return ok;
});
})();
</script>

function applyLanguage() {
    try { currentLang = localStorage.getItem('rfx_lang') || 'ku'; } catch(e) {}
    document.documentElement.dir = currentLang === 'en' ? 'ltr' : 'rtl';
    
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (lexicon[currentLang] && lexicon[currentLang][key]) el.innerHTML = lexicon[currentLang][key];
    });
    document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const key = el.getAttribute('data-i18n-ph');
        if (lexicon[currentLang] && lexicon[currentLang][key]) el.placeholder = lexicon[currentLang][key];
    });

    let t = lexicon[currentLang];
    let infoContainer = $('info-content-container');
    if(infoContainer && t) {
        infoContainer.innerHTML = `

}

window.toggleLiveApi = function() {
    clearInterval(liveApiInterval);
    let asset = $('liveApiAsset').value;
    if(asset === 'none') {
        $('liveApiDisplay').innerText = "-- $";
        window.livePriceValue = null;
        window.livePriceDegree = null;
        window.updateAstro();
        return;
    }
    fetchLivePrice(asset);
    liveApiInterval = setInterval(() => fetchLivePrice(asset), 5000);
};

async function fetchLivePrice(symbol) {
    try {
        let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`, {cache:"no-store"});
        let data = await res.json();
        if(data.price) {
            let price = parseFloat(data.price);
            window.livePriceValue = price;
            $('liveApiDisplay').innerText = price.toFixed(2) + " $";
            
            let convMethod = $('astroPriceConvMethod').value;
            if(convMethod === 'sqrt') window.livePriceDegree = (Math.sqrt(price) * 180) % 360;
            else window.livePriceDegree = price % 360;
            
            window.updateAstro();
        }
    } catch(e) {
        console.log("API Error", e);
    }
}

    const dash = $('view-astro-info');

};

function loadAstroSet() { 
    try { 
        astIds.forEach(id => { let v = localStorage.getItem('rfx_ast_' + id); let el = $(id); if(v !== null && el) el.value = v; }); 
        astChecks.forEach(id => { let v = localStorage.getItem('rfx_ast_' + id); let el = $(id); if(v !== null && el) el.checked = (v === 'true'); });
    } catch(e) {} 
}

function saveAstroSet() { 
    try { 
        astIds.forEach(id => { let el = $(id); if(el) localStorage.setItem('rfx_ast_' + id, el.value); }); 
        astChecks.forEach(id => { let el = $(id); if(el) localStorage.setItem('rfx_ast_' + id, el.checked); });
    } catch(e) {} 
}

function getPlanets(dateObj) {
    const d = (dateObj.getTime() / 86400000) - 10957.5;
    let gSun = (357.529 + 0.98560028 * d) % 360, qSun = (280.459 + 0.98564736 * d) % 360;
    let LSun = qSun + 1.915 * Math.sin(gSun * Math.PI/180) + 0.020 * Math.sin(2*gSun * Math.PI/180);
    let LMoon = (218.316 + 13.176396 * d) % 360, MMoon = (134.963 + 13.064993 * d) % 360; LMoon = LMoon + 6.289 * Math.sin(MMoon * Math.PI/180);
    let LMerc = (252.251 + 4.092339 * d) % 360, LVen = (181.979 + 1.602130 * d) % 360, LMars = (355.433 + 0.524020 * d) % 360;
    let LJup = (34.351 + 0.083091 * d) % 360, LSat = (50.077 + 0.033459 * d) % 360, LUra = (314.055 + 0.011731 * d) % 360;
    let LNep = (304.349 + 0.005981 * d) % 360, LPluto = (238.929 + 0.00396 * d) % 360;
    let LNode = (125.045 - 0.05295 * d) % 360, LSouthNode = (LNode + 180) % 360; 

    let pl = [
        { id: "Sun", symbol: "☉", angle: LSun, color: "#ffd700", speed: 0.9856 }, { id: "Moon", symbol: "☽", angle: LMoon, color: "#e6e6e6", speed: 13.176 },
        { id: "Mercury", symbol: "☿", angle: LMerc, color: "#11ffcc", speed: 4.092 }, { id: "Venus", symbol: "♀", angle: LVen, color: "#ff66b2", speed: 1.602 },
        { id: "Mars", symbol: "♂", angle: LMars, color: "#ff3333", speed: 0.524 }, { id: "Jupiter", symbol: "♃", angle: LJup, color: "#ffa500", speed: 0.083 },
        { id: "Saturn", symbol: "♄", angle: LSat, color: "#b366ff", speed: 0.033 }, { id: "Uranus", symbol: "♅", angle: LUra, color: "#00ccff", speed: 0.011 },
        { id: "Neptune", symbol: "♆", angle: LNep, color: "#3333ff", speed: 0.005 }, { id: "Pluto", symbol: "♇", angle: LPluto, color: "#ff99cc", speed: 0.003 },
        { id: "Node", symbol: "☊", angle: LNode, color: "#ffffff", speed: -0.052 }, { id: "S-Node", symbol: "☋", angle: LSouthNode, color: "#aaaaaa", speed: -0.052 }
    ];
    return pl.map(p => { p.angle = p.angle % 360; if (p.angle < 0) p.angle += 360; return p; });
}

function getStaticTime(nowDate, orbDeg, relativeSpeed, isStart, maxOrb) { 
    let dDiff = (maxOrb - orbDeg) / (relativeSpeed || 1);
    let tDate = new Date(nowDate.getTime() + (isStart ? -1 : 1) * dDiff * 86400000);
    return tDate.toLocaleDateString('en-GB') + " " + tDate.getHours().toString().padStart(2, '0') + ":00"; 
}

function createLine(x1, y1, x2, y2, color, dash) { 
    let l = document.createElementNS("http://www.w3.org/2000/svg", "line"); 
    l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2); 
    l.setAttribute("stroke", color); l.setAttribute("stroke-dasharray", dash); return l; 
}

function addNode(parent, cls, x, y, txt, colorCode = null) { 
    const n = document.createElement('div'); n.className = 'node ' + cls; n.style.left = x + 'px'; n.style.top = y + 'px'; 
    n.innerHTML = txt; if(colorCode) { n.style.color = colorCode; n.style.borderColor = colorCode; if(cls.includes('zodiac-node')) n.style.textShadow = `0 0 10px ${colorCode}`; }
    parent.appendChild(n); 
}

window.updateAstro = function() {
    let t = lexicon[currentLang] || lexicon['ku'];
    let dateVal = $('astroDate').value;
    let timeVal = $('astroTime').value || '00:00:00';
    let now = dateVal ? new Date(dateVal + 'T' + timeVal) : new Date();
    let planets = getPlanets(now);

    let searchP = parseFloat($('searchPrice').value);
    let convMethod = $('astroPriceConvMethod').value;
    let manualPriceDegree = null;
    if(searchP && searchP > 0) {
        if(convMethod === 'sqrt') manualPriceDegree = (Math.sqrt(searchP) * 180) % 360;
        else manualPriceDegree = searchP % 360;
        $('resPriceDeg').innerText = manualPriceDegree.toFixed(1) + "°";
    } else {
        $('resPriceDeg').innerText = "--°";
    }

    let searchD = $('searchDate').value;
    let manualDateDegree = null;
    if(searchD) {
        let d = new Date(searchD); let year = d.getFullYear(); let springEq = new Date(year, 2, 21);
        let diff = (d - springEq) / (1000 * 60 * 60 * 24);
        manualDateDegree = (diff * 0.9856) % 360;
        if(manualDateDegree < 0) manualDateDegree += 360;
        $('resDateDeg').innerText = manualDateDegree.toFixed(1) + "°";
    } else {
        $('resDateDeg').innerText = "--°";
    }

    let searchT = $('searchTime').value;
    let manualTimeDegree = null;
    if(searchT) {
        let parts = searchT.split(':'); let h = parseInt(parts[0]); let m = parseInt(parts[1]);
        manualTimeDegree = ((h + m/60) / 24) * 360;
        $('resTimeDeg').innerText = manualTimeDegree.toFixed(1) + "°";
    } else {
        $('resTimeDeg').innerText = "--°";
    }

    let geomMode = $('astroGeometry').value;
    let geomAnchor = 0;

    const wheelDiv = $('container-astro');
    const svg = $('svg-layer-astro');
    wheelDiv.querySelectorAll('.node').forEach(el => el.remove());
    svg.innerHTML = '';

    const center = 550, rDegreeRing = 510, rZodiac = 470, rLivePrice = 415, rPlanet = 360, spinDir = 1; 

    for(let d=0; d<360; d+=1) {
        let rad = (d * spinDir - 90) * Math.PI / 180;
        let isMajor = (d % 10 === 0);
        let isMinor = (d % 5 === 0 && !isMajor);
        let tickLen = isMajor ? 12 : (isMinor ? 8 : 4);
        let px1 = center + rDegreeRing * Math.cos(rad);
        let py1 = center + rDegreeRing * Math.sin(rad);
        let px2 = center + (rDegreeRing - tickLen) * Math.cos(rad);
        let py2 = center + (rDegreeRing - tickLen) * Math.sin(rad);
        let tickColor = isMajor ? "rgba(255,255,255,0.6)" : (isMinor ? "rgba(255,255,255,0.4)" : "rgba(255,255,255,0.15)");
        let tick = createLine(px1, py1, px2, py2, tickColor, "0");
        tick.setAttribute("stroke-width", isMajor ? "2" : "1");
        svg.appendChild(tick);

        if(isMajor) {
            let tx = center + (rDegreeRing + 20) * Math.cos(rad);
            let ty = center + (rDegreeRing + 20) * Math.sin(rad);
            addNode(wheelDiv, 'degree-text', tx, ty, d + "°");
        }
    }

    const zodiacData = [
        {k: "ar", c: "#ff4d4d"}, {k: "ta", c: "#00cc66"}, {k: "ge", c: "#ffff66"}, {k: "ca", c: "#33ccff"}, 
        {k: "le", c: "#ff4d4d"}, {k: "vi", c: "#00cc66"}, {k: "li", c: "#ffff66"}, {k: "sc", c: "#33ccff"}, 
        {k: "sa", c: "#ff4d4d"}, {k: "cp", c: "#00cc66"}, {k: "aq", c: "#ffff66"}, {k: "pi", c: "#33ccff"}
    ];

    for (let i = 0; i < 12; i++) {
        let angle = (i * 30 + 15), px = center + rZodiac * Math.cos((angle * spinDir - 90) * Math.PI / 180), py = center + rZodiac * Math.sin((angle * spinDir - 90) * Math.PI / 180);
        addNode(wheelDiv, 'zodiac-node', px, py, t[zodiacData[i].k], zodiacData[i].c);
    }

    if (window.livePriceDegree !== null && window.livePriceDegree !== undefined) {
        let pRad = (window.livePriceDegree * spinDir - 90) * Math.PI / 180;
        let px = center + rLivePrice * Math.cos(pRad), py = center + rLivePrice * Math.sin(pRad);
        addNode(wheelDiv, 'planet-node live-marker', px, py, `📡 $${window.livePriceValue.toFixed(1)}`);
        let guideLine = createLine(center, center, px, py, "#00ffcc", "2,2"); guideLine.setAttribute("stroke-width", "2"); guideLine.setAttribute("opacity", "0.5"); svg.appendChild(guideLine);
    }

    if (manualPriceDegree !== null) {
        let pRad = (manualPriceDegree * spinDir - 90) * Math.PI / 180;
        let px = center + rPlanet * Math.cos(pRad), py = center + rPlanet * Math.sin(pRad);
        addNode(wheelDiv, 'planet-node search-marker', px, py, `🎯 ${searchP}`, "#000");
        let guideLine = createLine(center, center, px, py, "#d4af37", "4,4"); guideLine.setAttribute("stroke-width", "2"); svg.appendChild(guideLine);
    }

    if (manualDateDegree !== null) {
        let pRad = (manualDateDegree * spinDir - 90) * Math.PI / 180;
        let px = center + rPlanet * Math.cos(pRad), py = center + rPlanet * Math.sin(pRad);
        addNode(wheelDiv, 'planet-node search-marker', px, py, `📅 Date`, "#000");
        let guideLine = createLine(center, center, px, py, "#33ccff", "4,4"); guideLine.setAttribute("stroke-width", "2"); svg.appendChild(guideLine);
    }

    if (manualTimeDegree !== null) {
        let pRad = (manualTimeDegree * spinDir - 90) * Math.PI / 180;
        let px = center + rPlanet * Math.cos(pRad), py = center + rPlanet * Math.sin(pRad);
        addNode(wheelDiv, 'planet-node search-marker', px, py, `⏱️ Time`, "#000");
        let guideLine = createLine(center, center, px, py, "#ff3399", "4,4"); guideLine.setAttribute("stroke-width", "2"); svg.appendChild(guideLine);
    }

    let showPlanets = $('astroShowPlanets') ? $('astroShowPlanets').checked : true;
    let showAspects = $('astroShowAspects') ? $('astroShowAspects').checked : true;

    let signalsHTML = "";
    let hasSignals = false;

    for(let i=0; i<planets.length; i++) {
        for(let j=i+1; j<planets.length; j++) {
            let diff = Math.abs(planets[i].angle - planets[j].angle);
            if(diff > 180) diff = 360 - diff;
            
            let lineCol = "", aspectName = "", effectDesc = "", cardType = "neutral", orb = 0, maxLimit = 5;
            
            if(Math.abs(diff - 0) < 6) { lineCol = "#ff3399"; aspectName = t.asp_conj; orb = diff; maxLimit = 6; effectDesc = (planets[i].id === "Sun" && planets[j].id === "Moon") ? t.eff_conj_moon : t.eff_conj; cardType = (planets[i].id === "Sun" && planets[j].id === "Moon") ? "sell" : "buy"; } 
            else if(Math.abs(diff - 180) < 6) { lineCol = "#ff3333"; aspectName = t.asp_opp; orb = Math.abs(diff - 180); maxLimit = 6; effectDesc = t.eff_opp; cardType = "sell"; } 
            else if(Math.abs(diff - 120) < 5) { lineCol = "#00ffcc"; aspectName = t.asp_trine; orb = Math.abs(diff - 120); maxLimit = 5; effectDesc = t.eff_trine; cardType = "buy"; } 
            else if(Math.abs(diff - 90) < 5) { lineCol = "#ff9900"; aspectName = t.asp_sq; orb = Math.abs(diff - 90); maxLimit = 5; effectDesc = t.eff_sq; cardType = "neutral"; } 
            else if(Math.abs(diff - 60) < 4) { lineCol = "#33ccff"; aspectName = t.asp_sext; orb = Math.abs(diff - 60); maxLimit = 4; effectDesc = t.eff_sext; cardType = "buy"; } 
            
            if(lineCol !== "") {
                hasSignals = true;
                let impactStr = ""; let combinedIDs = planets[i].id + planets[j].id;
                if(combinedIDs.includes("Sun") || combinedIDs.includes("Moon") || combinedIDs.includes("Venus")) impactStr += t.impact_gold;
                if(combinedIDs.includes("Uranus") || combinedIDs.includes("Pluto") || combinedIDs.includes("Node")) { impactStr += (impactStr !== "" ? " | " : "") + t.impact_crypto; cardType = "sell"; }
                if(combinedIDs.includes("Jupiter") || combinedIDs.includes("Saturn") || combinedIDs.includes("Mars") || combinedIDs.includes("Mercury")) { impactStr += (impactStr !== "" ? " | " : "") + t.impact_news; if(combinedIDs.includes("Jupiter")) cardType = "buy"; else if (combinedIDs.includes("Saturn")) cardType = "sell"; }

                let relSpeed = Math.abs(planets[i].speed - planets[j].speed) || 0.5;
                let startTime = getStaticTime(now, orb, relSpeed, true, maxLimit), endTime = getStaticTime(now, orb, relSpeed, false, maxLimit);
                
                signalsHTML += `
                    <div class="signal-card ${cardType}">
                        <div class="sig-head"><span class="sig-title">${planets[i].symbol} ${planets[i].id} & ${planets[j].symbol} ${planets[j].id}</span><span style="color:${lineCol}; font-weight:bold; font-size:11px;">${aspectName}</span></div>
                        <div class="sig-impact">🎯 ${impactStr}</div>
                        <div class="sig-body">${effectDesc}</div>
                        <div class="sig-times"><span>${t.sig_start} <strong>${startTime}</strong></span><span class="end">${t.sig_end} <strong>${endTime}</strong></span></div>
                    </div>
                `;
                
                if (showAspects) {
                    let px1 = center + rPlanet * Math.cos((planets[i].angle * spinDir - 90) * Math.PI / 180), py1 = center + rPlanet * Math.sin((planets[i].angle * spinDir - 90) * Math.PI / 180);
                    let px2 = center + rPlanet * Math.cos((planets[j].angle * spinDir - 90) * Math.PI / 180), py2 = center + rPlanet * Math.sin((planets[j].angle * spinDir - 90) * Math.PI / 180);
                    let aspectLine = createLine(px1, py1, px2, py2, lineCol, "6,8"); aspectLine.setAttribute("stroke-width", "1.5"); aspectLine.setAttribute("opacity", "0.6"); svg.appendChild(aspectLine);
                }
            }
        }
    }
    $('live-aspects-container').innerHTML = hasSignals ? signalsHTML : `<div style="color:#aaa; font-size:12px; text-align:center; padding:10px;">${t.no_signals}</div>`;

    if (showPlanets) {
        planets.forEach(p => {
            let rad = (p.angle * spinDir - 90) * Math.PI / 180;
            let px = center + rPlanet * Math.cos(rad), py = center + rPlanet * Math.sin(rad), zx = center + rZodiac * Math.cos(rad), zy = center + rZodiac * Math.sin(rad);
            let guideLine = createLine(zx, zy, px, py, p.color, "3,3"); guideLine.setAttribute("opacity", "0.3"); svg.appendChild(guideLine);
            addNode(wheelDiv, 'planet-node', px, py, `${p.symbol} ${Math.floor(p.angle)}°`, p.color);
        });
    }

    if(geomMode !== 'none') {
        let ptsCount = 0, strokeColor = "";
        if(geomMode === 'tetra') { ptsCount = 4; strokeColor = "#ff3333"; } 
        else if(geomMode === 'penta') { ptsCount = 5; strokeColor = "#ffcc00"; }
        else if(geomMode === 'hexa') { ptsCount = 6; strokeColor = "#00ffcc"; }

        let gPts = [];
        for(let i=0; i<ptsCount; i++) {
            let a = geomAnchor + (i * (360 / ptsCount)), rad = (a * spinDir - 90) * Math.PI / 180;
            gPts.push({ x: center + rDegreeRing * Math.cos(rad), y: center + rDegreeRing * Math.sin(rad) });
        }

        let gPath = document.createElementNS("http://www.w3.org/2000/svg", "path"), pathStr = "";
        if(geomMode === 'tetra') { pathStr = `M ${gPts[0].x} ${gPts[0].y} L ${gPts[1].x} ${gPts[1].y} L ${gPts[2].x} ${gPts[2].y} L ${gPts[3].x} ${gPts[3].y} Z`; }
        else if(geomMode === 'penta') { pathStr = `M ${gPts[0].x} ${gPts[0].y} L ${gPts[2].x} ${gPts[2].y} L ${gPts[4].x} ${gPts[4].y} L ${gPts[1].x} ${gPts[1].y} L ${gPts[3].x} ${gPts[3].y} Z`; }
        else if(geomMode === 'hexa') { pathStr = `M ${gPts[0].x} ${gPts[0].y} L ${gPts[2].x} ${gPts[2].y} L ${gPts[4].x} ${gPts[4].y} Z M ${gPts[1].x} ${gPts[1].y} L ${gPts[3].x} ${gPts[3].y} L ${gPts[5].x} ${gPts[5].y} Z`; }

        gPath.setAttribute("d", pathStr); gPath.setAttribute("stroke", strokeColor); gPath.setAttribute("stroke-width", "3"); gPath.setAttribute("fill", "none"); gPath.setAttribute("opacity", "0.6"); gPath.setAttribute("style", `filter: drop-shadow(0px 0px 8px ${strokeColor})`);
        svg.appendChild(gPath);
    }

    let sunObj = planets.find(p => p.id === "Sun"), moonObj = planets.find(p => p.id === "Moon"), nodeObj = planets.find(p => p.id === "Node");
    let moonDiff = (moonObj.angle - sunObj.angle + 360) % 360, moonText = "", isEclipse = false, eclipseText = "";
    if(moonDiff < 15 || moonDiff > 345) { moonText = t.moon_new; if(nodeObj && (Math.abs(sunObj.angle - nodeObj.angle) < 18 || Math.abs(sunObj.angle - ((nodeObj.angle+180)%360)) < 18)) { isEclipse = true; eclipseText = t.moon_eclipse_solar; } } 
    else if (moonDiff >= 80 && moonDiff <= 100) moonText = t.moon_1q;
    else if (moonDiff >= 165 && moonDiff <= 195) { moonText = t.moon_full; if(nodeObj && (Math.abs(sunObj.angle - nodeObj.angle) < 15 || Math.abs(sunObj.angle - ((nodeObj.angle+180)%360)) < 15)) { isEclipse = true; eclipseText = t.moon_eclipse_lunar; } } 
    else if (moonDiff >= 260 && moonDiff <= 280) moonText = t.moon_3q;
    else if (moonDiff >= 15 && moonDiff < 80) moonText = t.moon_waxing;
    else if (moonDiff > 100 && moonDiff < 165) moonText = t.moon_wax_gib;
    else if (moonDiff > 195 && moonDiff < 260) moonText = t.moon_wan_gib;
    else if (moonDiff > 280 && moonDiff <= 345) moonText = t.moon_waning;

    let sunDeg = sunObj.angle, sunText = "";
    if(sunDeg >= 0 && sunDeg < 90) sunText = t.sun_spring; else if(sunDeg >= 90 && sunDeg < 180) sunText = t.sun_summer; else if(sunDeg >= 180 && sunDeg < 270) sunText = t.sun_autumn; else sunText = t.sun_winter;
    
    let phaseBar = $('phase-container'); phaseBar.style.display = 'grid';
    let borderStyle = currentLang === 'en' ? "border-right: 1px dashed #444;" : "border-left: 1px dashed #444;";
    phaseBar.innerHTML = `<div class="phase-col" style="${borderStyle}"><div class="phase-title">${t.sun_title}</div><div class="phase-val">${sunText}</div></div><div class="phase-col"><div class="phase-title">${t.moon_title}</div><div class="phase-val">${moonText}</div>${isEclipse ? `<div class="eclipse-warn">${eclipseText}</div>` : ''}</div>`;
};

function upT(){
    $('zoom-layer').style.transform=`translate(${px}px, ${py}px) scale(${sc})`;
}

function getEP(e){
    return e.touches&&e.touches.length>0 ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY};
}

function initControls(){
    $('btn-menu').addEventListener('click', function(e) { e.stopPropagation(); $('sidebar').classList.toggle('active'); });
    $('btn-close-menu').addEventListener('click', function() { $('sidebar').classList.remove('active'); });

    astIds.forEach(id => {
        let el = $(id);
        if(el) {
            el.addEventListener('change', () => { saveAstroSet(); window.updateAstro(); });
            if(el.tagName === 'INPUT') el.addEventListener('input', () => { saveAstroSet(); window.updateAstro(); });
        }
    });

    astChecks.forEach(id => {
        let el = $(id);
        if(el) { el.addEventListener('change', () => { saveAstroSet(); window.updateAstro(); }); }
    });
}

function initMapEvents(){
    const vM = $('viewport-maps');

    vM.addEventListener('mousedown',e=>{
        if(e.target.closest('.sidebar')||e.target.closest('.header')||e.target.closest('#view-astro-info')||e.target.closest('#phase-container')||e.target.closest('#astro-info-btn')) return;
        let p=getEP(e); dg=true; sx=p.x-px; sy=p.y-py; vM.style.cursor='grabbing';
    });

    window.addEventListener('mousemove',e=>{
        if(dg){ let p=getEP(e); px=p.x-sx; py=p.y-sy; upT(); }
    });

    window.addEventListener('mouseup',()=>{
        dg=false; vM.style.cursor='grab';
    });

    vM.addEventListener('wheel',e=>{
        if(e.target.closest('.sidebar')||e.target.closest('.header')||e.target.closest('#view-astro-info')||e.target.closest('#phase-container')) return;
        e.preventDefault(); sc+=e.deltaY*-0.001; sc=Math.min(Math.max(0.15,sc),5); upT();
    }, {passive:false});

    vM.addEventListener('touchstart',e=>{
        if(e.target.closest('.sidebar')||e.target.closest('.header')||e.target.closest('#view-astro-info')||e.target.closest('#phase-container')||e.target.closest('#astro-info-btn')) return;
        if(e.touches.length===2){
            dg=false; iDist=Math.hypot(e.touches[0].pageX-e.touches[1].pageX,e.touches[0].pageY-e.touches[1].pageY);
        } else {
            let p=getEP(e); dg=true; sx=p.x-px; sy=p.y-py;
        }
    }, {passive:false});

    vM.addEventListener('touchmove',e=>{
        if(e.target.closest('.sidebar')||e.target.closest('.header')||e.target.closest('#view-astro-info')||e.target.closest('#phase-container')) return;
        if(e.touches.length===2){
            e.preventDefault();
            const d=Math.hypot(e.touches[0].pageX-e.touches[1].pageX,e.touches[0].pageY-e.touches[1].pageY);
            sc=Math.min(Math.max(0.15,sc*(d/iDist)),5); iDist=d; upT();
        } else if(dg){
            e.preventDefault(); let p=getEP(e); px=p.x-sx; py=p.y-sy; upT();
        }
    }, {passive:false});

    window.addEventListener('touchend',()=>{ dg=false; });
}

document.addEventListener('DOMContentLoaded', async function() {
    const ok = window.RFX_SECURITY_READY ? await window.RFX_SECURITY_READY : true;
    if(!ok) return;

    applyLanguage();
    loadAstroSet();
    initControls();
    initMapEvents();

    window.toggleLiveApi();
    px = 0; py = 0; upT();
    window.updateAstro();

    setInterval(() => { window.updateAstro(); }, 60000);
});

})();
</script>
</body>
</html>
