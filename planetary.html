function calcPriceAtAngle(angle, cycleOffset = 0) {
    const base = parseFloat($("planPrice").value) || 0;
    const tr = $("planTrend").value;
    const root = Math.sqrt(Math.max(0, base));
    const totalAngle = angle + cycleOffset;
    const price = tr === "up" ? Math.pow(root + (totalAngle / 180), 2) : Math.pow(Math.max(0, root - (totalAngle / 180)), 2);
    return price.toFixed(2);
}

function formatAnglePrices(list, cycleOffset = 0) {
    return list.map(v => {
        const ang = Math.abs(v - Math.round(v)) < 0.001 ? Math.round(v) : Number(v.toFixed(2));
        return `<div style="display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed #222;padding:2px 0;"><span>${ang}°</span><b style="color:#d4af37;">${calcPriceAtAngle(v, cycleOffset)}</b></div>`;
    }).join("");
}

function buildShapeDetails(targetId = "shapeInfoBox") {
    const sel = $("planShape");
    const box = $(targetId);
    if (!sel || !box) return;

    const info = getShapeInfo(sel.value);
    const step = info.step;
    const isOuter = info.type === "outer";
    const typeText = isOuter ? t("outer_main") : t("inner_sub");
    const typeColor = isOuter ? "#00ffcc" : "#ff3399";
    const name = cleanShapeName(sel.options[sel.selectedIndex]?.text || "Shape");
    const count = Math.max(1, Math.round(360 / step));

    const outerAngles = [];
    const innerAngles = [];

    for (let i = 0; i < count; i++) {
        outerAngles.push((i * step) % 360);
        innerAngles.push((i * step + step / 2) % 360);
    }

    const mainAngles = isOuter ? outerAngles : innerAngles;
    const subAngles = isOuter ? innerAngles : outerAngles;
    const activeCycle = Math.max(0, (parseInt($("planCycles").value) || 1) - 1) * 360;

    const strengthText = isOuter ? t("outer_desc") : t("inner_desc");

    box.innerHTML = `
        <div class="shape-info-title">${name} - <span style="color:${typeColor};">${typeText}</span></div>
        <div class="shape-info-row"><span class="shape-info-label">${t("corners_count")}</span> <span class="shape-info-main">${count}</span></div>
        <div class="shape-info-row"><span class="shape-info-label">${t("degree_step")}</span> <span class="shape-info-main">${step.toFixed(4).replace(/\.0+$/,"")}°</span></div>
        <div class="shape-info-row"><span class="shape-info-label">${t("main_angles_price")}</span><br><div class="shape-info-main">${formatAnglePrices(mainAngles, activeCycle)}</div></div>
        <div class="shape-info-row"><span class="shape-info-label">${t("sub_angles_price")}</span><br><div class="shape-info-sub">${formatAnglePrices(subAngles, activeCycle)}</div></div>
        <div class="shape-info-row" style="color:#aaa; border-top:1px dashed #333; margin-top:8px; padding-top:6px;">${strengthText}</div>
    `;
}

function toggleShapeDetails(targetId) {
    const box = $(targetId);
    if (!box) return;
    buildShapeDetails(targetId);
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function applyLanguage() {
    try { currentLang = localStorage.getItem("rfx_lang") || "ku"; } catch(e) {}
    if (!lexicon[currentLang]) currentLang = "ku";

    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === "en" ? "ltr" : "rtl";

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (lexicon[currentLang] && lexicon[currentLang][key]) el.innerHTML = lexicon[currentLang][key];
    });

    document.querySelectorAll("[data-i18n-ph]").forEach(el => {
        const key = el.getAttribute("data-i18n-ph");
        if (lexicon[currentLang] && lexicon[currentLang][key]) el.placeholder = lexicon[currentLang][key];
    });

    const rb = $("smart-ruler-box");
    if (rb) rb.style.direction = currentLang === "en" ? "ltr" : "rtl";

    populateShapes(true);

    if (typeof window.calcGannAngle === "function") window.calcGannAngle();
    if ($("shapeInfoBox")?.style.display === "block") buildShapeDetails("shapeInfoBox");
    if ($("floatingShapeInfoBox")?.style.display === "block") buildShapeDetails("floatingShapeInfoBox");
}

function populateShapes(keepValue = false) {
    const sel = $("planShape");
    if (!sel) return;

    const oldValue = keepValue ? sel.value : null;
    const names = getShapeNames();

    sel.innerHTML = "";

    for (let i = 1; i <= 24; i++) {
        const degVal = (360 / i).toFixed(4);
        const degDisplay = parseFloat((360 / i).toFixed(2));

        const optOut = document.createElement("option");
        optOut.value = `${degVal}_outer`;
        optOut.text = `${names[i - 1]} ${t("outer_main")} (${degDisplay}°)`;
        sel.add(optOut);

        const optIn = document.createElement("option");
        optIn.value = `${degVal}_inner`;
        optIn.text = `${names[i - 1]} ${t("inner_sub")} (${degDisplay}°)`;
        sel.add(optIn);
    }

    if (oldValue && [...sel.options].some(o => o.value === oldValue)) {
        sel.value = oldValue;
    } else {
        sel.value = "90.0000_outer";
    }
}

const savedIds = ["calcBase", "calcRetrace", "planPrice", "planTrend", "planShape", "planCycles"];
const savedChecks = ["planShowFan", "planShowShape", "planShowRuler"];

function loadSet() {
    try {
        savedIds.forEach(id => {
            const v = localStorage.getItem("rfx_pl_" + id);
            const el = $(id);
            if (v !== null && el) el.value = v;
        });

        savedChecks.forEach(id => {
            const v = localStorage.getItem("rfx_pl_" + id);
            const el = $(id);
            if (v !== null && el) el.checked = (v === "true");
        });
    } catch(e) {}
}

function saveSet() {
    try {
        savedIds.forEach(id => {
            const el = $(id);
            if (el) localStorage.setItem("rfx_pl_" + id, el.value);
        });

        savedChecks.forEach(id => {
            const el = $(id);
            if (el) localStorage.setItem("rfx_pl_" + id, el.checked);
        });
    } catch(e) {}
}

window.calcGannAngle = function() {
    const b = parseFloat($("calcBase").value);
    const r = parseFloat($("calcRetrace").value);
    const analysisBox = $("calcAnalysis");

    if (b > 0 && r > 0) {
        const rawDeg = Math.abs(Math.sqrt(r) - Math.sqrt(b)) * 180;
        const deg = Math.round(rawDeg);

        $("calcResult").innerText = `${t("calc_res")}${deg}°`;

        let degMod = ((rawDeg % 360) + 360) % 360;
        if (Math.abs(degMod) < 0.0001) degMod = 360;

        const realShapes = [
            { name: t("shape_circle"), type: t("shape_outer"), step: 360 },
            { name: t("shape_circle"), type: t("shape_inner"), step: 180 },
            { name: t("shape_triangle"), type: t("shape_outer"), step: 120 },
            { name: t("shape_triangle"), type: t("shape_inner"), step: 60 },
            { name: t("shape_square"), type: t("shape_outer"), step: 90 },
            { name: t("shape_pentagon"), type: t("shape_outer"), step: 108 },
            { name: t("shape_pentagon"), type: t("shape_inner"), step: 72 },
            { name: t("shape_hexagram"), type: t("shape_outer"), step: 60 },
            { name: t("shape_7"), type: t("shape_outer"), step: 51.4285 },
            { name: t("shape_8"), type: t("shape_inner"), step: 45 }
        ];

        let best = null;

        for (const sh of realShapes) {
            const multiple = Math.max(1, Math.round(degMod / sh.step));
            const hit = multiple * sh.step;
            const diff = Math.min(Math.abs(degMod - hit), Math.abs(360 - Math.abs(degMod - hit)));
            if (!best || diff < best.diff) best = { ...sh, diff, hit };
        }

        const color = best.type === t("shape_outer") ? "#00ffcc" : "#ff3399";
        analysisBox.innerHTML = `${t("nearest_shape")} <b style="color:#d4af37;">${best.name}</b> - <b style="color:${color};">${best.type}</b>`;
        analysisBox.style.display = "block";
    } else {
        $("calcResult").innerText = t("calc_res_empty");
        analysisBox.style.display = "none";
    }

    saveSet();
};

function cL(x1, y1, x2, y2, c, d) {
    const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
    l.setAttribute("x1", x1);
    l.setAttribute("y1", y1);
    l.setAttribute("x2", x2);
    l.setAttribute("y2", y2);
    l.setAttribute("stroke", c);
    if (d && d !== "0") l.setAttribute("stroke-dasharray", d);
    return l;
}

function aN(p, cls, x, y, text, color = null, sTxt = null) {
    const n = document.createElement("div");
    n.className = "node " + cls;
    n.style.left = x + "px";
    n.style.top = y + "px";
    n.innerText = text;
    if (color) n.style.color = color;
    if (sTxt) n.style.cssText += sTxt;
    p.appendChild(n);
}

function dPl() {
    const p = parseFloat($("planPrice").value) || 0;
    const shapeInfo = getShapeInfo($("planShape").value);
    const st = shapeInfo.step;
    const isOuter = shapeInfo.type === "outer";
    const tr = $("planTrend").value;
    const dir = tr === "up" ? 1 : -1;
    const cycles = parseInt($("planCycles").value) || 1;

    $("displayCenter").innerText = p;

    const w = $("container-planetary");
    const sg = $("svg-layer-plan");

    w.querySelectorAll(".node, .time-marker, .time-label").forEach(e => e.remove());

    const rL = $("ruler-line");
    const rx2 = rL ? rL.getAttribute("x2") : 500;
    const ry2 = rL ? rL.getAttribute("y2") : 500;

    sg.innerHTML = "";

    const c = 500;
    const rt = Math.sqrt(Math.max(0, p));
    const rP_base = 240;
    const gapPerCycle = 85;
    const rA = rP_base + ((cycles > 1 ? cycles - 1 : 0) * gapPerCycle) + 70;
    const rT = rA + 100;
    const cycleColors = ["#d4af37", "#00ffcc", "#ff3399", "#ffcc00"];

    const pRing = document.querySelector(".price-ring");
    if (pRing) {
        pRing.style.width = (rP_base * 2) + "px";
        pRing.style.height = (rP_base * 2) + "px";
    }

    const aRing = document.querySelector(".angle-ring");
    if (aRing) {
        aRing.style.width = (rA * 2) + "px";
        aRing.style.height = (rA * 2) + "px";
    }

    const tRing = document.querySelector(".time-ring");
    if (tRing) {
        tRing.style.width = (rT * 2) + "px";
        tRing.style.height = (rT * 2) + "px";
    }

    for (let cLoop = 1; cLoop < cycles; cLoop++) {
        const currentRp = rP_base + (cLoop * gapPerCycle);
        const crc = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        crc.setAttribute("cx", c);
        crc.setAttribute("cy", c);
        crc.setAttribute("r", currentRp);
        crc.setAttribute("fill", "none");
        crc.setAttribute("stroke", cycleColors[cLoop % cycleColors.length]);
        crc.setAttribute("stroke-dasharray", "4,4");
        crc.setAttribute("stroke-width", "1.5");
        crc.setAttribute("opacity", "0.4");
        sg.appendChild(crc);
    }

    const nw = new Date();
    const cR = ((((nw.getHours() + (nw.getMinutes() / 60) - 1) * 15) * dir) - 90) * (Math.PI / 180);

    for (let a = 0; a < 360; a += 15) {
        const r = ((a * dir) - 90) * (Math.PI / 180);
        const clr = `hsl(${a},100%,50%)`;

        const priceRadius = rP_base - 28;
        const angleRadius = rA + 8;
        const timeRadius = rT;

        const priceVal = tr === "up"
            ? Math.pow((rt + (a / 180)), 2).toFixed(2)
            : Math.pow(Math.max(0, rt - (a / 180)), 2).toFixed(2);

        aN(w, "price-node",
            c + priceRadius * Math.cos(r),
            c + priceRadius * Math.sin(r),
            priceVal,
            null,
            "font-size:8px; padding:2px 4px; opacity:0.75; border-color:#333; z-index:55;"
        );

        if (a % 30 === 0) {
            aN(w, "angle-node",
                c + angleRadius * Math.cos(r),
                c + angleRadius * Math.sin(r),
                a + "°",
                clr,
                "font-size:10px; z-index:65; background:rgba(0,0,0,0.65); padding:2px 4px; border-radius:4px;"
            );
        }

        aN(w, "time-node",
            c + timeRadius * Math.cos(r),
            c + timeRadius * Math.sin(r),
            ((Math.floor(a / 15) + 1) % 24) + ":00",
            clr,
            "font-size:11px; opacity:0.8;"
        );
    }

    aN(w, "time-marker", c + rT * Math.cos(cR), c + rT * Math.sin(cR), "");
    aN(w, "time-label", c + (rT + 30) * Math.cos(cR), c + (rT + 30) * Math.sin(cR), nw.getHours().toString().padStart(2, "0") + ":" + nw.getMinutes().toString().padStart(2, "0"));

    if ($("planShowFan").checked) {
        [0, 45, 90, 135, 180, 225, 270, 315].forEach(a => {
            const outerRp = rP_base + ((cycles - 1) * gapPerCycle);
            sg.appendChild(cL(
                c,
                c,
                c + outerRp * Math.cos(((a * dir) - 90) * (Math.PI / 180)),
                c + outerRp * Math.sin(((a * dir) - 90) * (Math.PI / 180)),
                `hsla(${a},100%,65%,0.3)`,
                "8,8"
            ));
        });
    }

    for (let cLoop = 0; cLoop < cycles; cLoop++) {
        const cycleOffset = cLoop * 360;
        const currentRp = rP_base + (cLoop * gapPerCycle);
        const cyclePoints = [];
        const mnP = [];
        const cyColor = cycleColors[cLoop % cycleColors.length];

        const specialStyle = cLoop === 0
            ? `border: 1px solid ${cyColor}; color: #fff; z-index: 90; box-shadow: 0 0 5px ${cyColor};`
            : `border: 2px solid ${cyColor}; color: ${cyColor}; background: rgba(0,0,0,0.9); z-index: ${90 - cLoop}; box-shadow: 0 0 15px ${cyColor}; border-radius: 12px; font-weight: 900; padding: 4px 8px; font-size: 10px;`;

        const midStyle = cLoop === 0
            ? `border: 1px dashed ${cyColor}; color: #ccc; z-index: 85; box-shadow: none; font-size: 8px; background: rgba(0,0,0,0.7); opacity: 0.8; padding: 2px 4px;`
            : `border: 1px dashed ${cyColor}; color: ${cyColor}; background: rgba(0,0,0,0.8); z-index: ${85 - cLoop}; border-radius: 8px; padding: 2px 5px; font-size: 8px; opacity: 0.7;`;

        const stepsCount = Math.max(1, Math.round(360 / st));

        for (let i = 0; i < stepsCount; i++) {
            const a = i * st;
            const r = ((a * dir) - 90) * (Math.PI / 180);
            const px1 = c + currentRp * Math.cos(r);
            const py1 = c + currentRp * Math.sin(r);

            cyclePoints.push({ x: px1, y: py1, c: `hsl(${a},100%,60%)`, a });

            const totalAngle = a + cycleOffset;
            const calcPrice = tr === "up"
                ? Math.pow((rt + (totalAngle / 180)), 2).toFixed(2)
                : Math.pow(Math.max(0, rt - (totalAngle / 180)), 2).toFixed(2);

            aN(w, "price-node", px1, py1, calcPrice, null, specialStyle);

            const aM = (a + (st / 2)) % 360;
            const rM = ((aM * dir) - 90) * (Math.PI / 180);
            const mnX = c + currentRp * Math.cos(rM);
            const mnY = c + currentRp * Math.sin(rM);

            mnP.push({ x: mnX, y: mnY, c: `hsla(${aM},100%,60%,0.6)`, a: aM });

            const totalAngleMid = aM + cycleOffset;
            const calcPriceMid = tr === "up"
                ? Math.pow((rt + (totalAngleMid / 180)), 2).toFixed(2)
                : Math.pow(Math.max(0, rt - (totalAngleMid / 180)), 2).toFixed(2);

            if ($("planShowShape").checked) {
                aN(w, "price-node", mnX, mnY, calcPriceMid, null, midStyle);
            }
        }

        if ($("planShowShape").checked && cyclePoints.length >= 2) {
            const outerMainDash = isOuter ? "0" : "7,7";
            const outerMainWidth = isOuter ? "3.2" : "1.3";
            const outerRadialDash = isOuter ? "0" : "7,7";
            const outerRadialWidth = isOuter ? "2.4" : "1.2";

            const innerMainDash = isOuter ? "7,7" : "0";
            const innerMainWidth = isOuter ? "1.4" : "3.2";
            const innerRadialDash = isOuter ? "7,7" : "0";
            const innerRadialWidth = isOuter ? "1.2" : "2.6";

            for (let i = 0; i < cyclePoints.length; i++) {
                const nP = (i + 1 === cyclePoints.length) ? cyclePoints[0] : cyclePoints[i + 1];

                const ln = cL(cyclePoints[i].x, cyclePoints[i].y, nP.x, nP.y, cyclePoints[i].c, cLoop === 0 ? outerMainDash : "7,7");
                ln.setAttribute("stroke-width", cLoop === 0 ? outerMainWidth : "1.4");
                ln.setAttribute("stroke-linecap", "round");
                ln.setAttribute("opacity", isOuter ? "0.95" : "0.45");
                sg.appendChild(ln);

                if (cLoop === cycles - 1) {
                    const sp = cL(c, c, cyclePoints[i].x, cyclePoints[i].y, `hsla(${i * (360 / cyclePoints.length)},100%,60%,0.55)`, outerRadialDash);
                    sp.setAttribute("stroke-width", outerRadialWidth);
                    sp.setAttribute("stroke-linecap", "round");
                    sp.setAttribute("opacity", isOuter ? "0.9" : "0.4");
                    sg.appendChild(sp);
                }
            }

            for (let i = 0; i < mnP.length; i++) {
                const nP = (i + 1 === mnP.length) ? mnP[0] : mnP[i + 1];

                const ln = cL(mnP[i].x, mnP[i].y, nP.x, nP.y, mnP[i].c, cLoop === 0 ? innerMainDash : "7,7");
                ln.setAttribute("stroke-width", cLoop === 0 ? innerMainWidth : "1.3");
                ln.setAttribute("stroke-linecap", "round");
                ln.setAttribute("opacity", isOuter ? "0.55" : "0.95");
                sg.appendChild(ln);

                if (cLoop === cycles - 1) {
                    const sp = cL(c, c, mnP[i].x, mnP[i].y, mnP[i].c, innerRadialDash);
                    sp.setAttribute("stroke-width", innerRadialWidth);
                    sp.setAttribute("stroke-linecap", "round");
                    sp.setAttribute("opacity", isOuter ? "0.55" : "0.95");
                    sg.appendChild(sp);
                }
            }
        }
    }

    const rl = cL(c, c, rx2, ry2, "#00ffcc", "6,6");
    rl.setAttribute("stroke-width", "2");
    rl.id = "ruler-line";
    sg.appendChild(rl);
}

function upT() {
    if (zL) zL.style.transform = `translate(${px}px, ${py}px) scale(${sc})`;
}

function getEP(e) {
    return e.touches && e.touches.length > 0
        ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
        : { x: e.clientX, y: e.clientY };
}

function chkC(x, y) {
    if (!$("planShowRuler").checked) return false;
    const r = gw.getBoundingClientRect();
    return Math.hypot(x - (r.left + r.width / 2), y - (r.top + r.height / 2)) < 150;
}

function upR(x, y) {
    const r = gw.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const rad = Math.atan2(y - cy, x - cx);
    const deg = rad * 180 / Math.PI;

    const tr = $("planTrend").value;
    const dir = tr === "up" ? 1 : -1;
    const base = parseFloat($("planPrice").value) || 0;
    const root = Math.sqrt(Math.max(0, base));

    let a = deg + 90;
    if (a < 0) a += 360;
    if (dir === -1) a = 360 - a;

    const lx = 500 + 470 * Math.cos(rad);
    const ly = 500 + 470 * Math.sin(rad);
    const rl = $("ruler-line");

    if (rl) {
        rl.setAttribute("x2", lx);
        rl.setAttribute("y2", ly);
    }

    const cp = tr === "up" ? Math.pow((root + (a / 180)), 2) : Math.pow(Math.max(0, root - (a / 180)), 2);

    $("ruler-ang-val").innerText = a.toFixed(1) + "°";
    $("ruler-prc-val").innerText = cp.toFixed(2);

    const rb = $("smart-ruler-box");
    rb.style.display = "block";
    rb.style.left = lx + "px";
    rb.style.top = ly + "px";
}

window.addEventListener("storage", function(e) {
    if (e.key === "rfx_lang") {
        applyLanguage();
        dPl();
    }
});

window.addEventListener("pageshow", function() {
    applyLanguage();
    dPl();
});

window.addEventListener("focus", function() {
    applyLanguage();
    dPl();
});

document.addEventListener("DOMContentLoaded", function() {
    vM = $("viewport-maps");
    zL = $("zoom-layer");
    gw = $("container-planetary");

    $("btn-menu").addEventListener("click", function(e) {
        e.stopPropagation();
        $("sidebar").classList.toggle("active");
    });

    $("btn-close-menu").addEventListener("click", function() {
        $("sidebar").classList.remove("active");
    });

    populateShapes();
    applyLanguage();
    loadSet();

    px = (window.innerWidth - 6000) / 2;
    py = (window.innerHeight - 6000) / 2;

    upT();
    dPl();
    window.calcGannAngle();

    $("shapeInfoBtn")?.addEventListener("click", () => toggleShapeDetails("shapeInfoBox"));
    $("floatingShapeInfoBtn")?.addEventListener("click", () => toggleShapeDetails("floatingShapeInfoBox"));

    ["planPrice","planTrend","planShape","planShowFan","planShowShape","planCycles"].forEach(id => {
        const el = $(id);
        if (el) {
            el.addEventListener("change", () => {
                saveSet();
                dPl();
                if ($("shapeInfoBox")?.style.display === "block") buildShapeDetails("shapeInfoBox");
                if ($("floatingShapeInfoBox")?.style.display === "block") buildShapeDetails("floatingShapeInfoBox");
            });

            if (el.tagName === "INPUT") {
                el.addEventListener("input", () => {
                    saveSet();
                    dPl();
                    window.calcGannAngle();
                });
            }
        }
    });

    $("planShowRuler").addEventListener("change", () => {
        saveSet();
        if (!$("planShowRuler").checked) {
            $("smart-ruler-box").style.display = "none";
            const r = $("ruler-line");
            if (r) {
                r.setAttribute("x2", 500);
                r.setAttribute("y2", 500);
            }
        }
    });

    vM.addEventListener("mousedown", e => {
        if (e.target.closest(".sidebar") || e.target.closest(".header")) return;
        const p = getEP(e);
        if (chkC(p.x, p.y)) {
            rdg = true;
            upR(p.x, p.y);
        } else {
            dg = true;
            sx = p.x;
            sy = p.y;
            vM.style.cursor = "grabbing";
        }
    });

    window.addEventListener("mousemove", e => {
        if (rdg) {
            const p = getEP(e);
            upR(p.x, p.y);
        } else if (dg) {
            px += (e.clientX - sx);
            py += (e.clientY - sy);
            sx = e.clientX;
            sy = e.clientY;
            upT();
        }
    });

    window.addEventListener("mouseup", () => {
        dg = false;
        rdg = false;
        vM.style.cursor = "grab";
    });

    vM.addEventListener("wheel", e => {
        if (e.target.closest(".sidebar") || e.target.closest(".header")) return;
        e.preventDefault();
        sc += e.deltaY * -0.001;
        sc = Math.min(Math.max(0.05, sc), 5);
        upT();
    }, { passive: false });

    vM.addEventListener("touchstart", e => {
        if (e.target.closest(".sidebar") || e.target.closest(".header")) return;

        if (e.touches.length === 2) {
            dg = false;
            rdg = false;
            iDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        } else {
            const p = getEP(e);
            if (chkC(p.x, p.y)) {
                rdg = true;
                upR(p.x, p.y);
            } else {
                dg = true;
                sx = p.x;
                sy = p.y;
            }
        }
    }, { passive: false });

    vM.addEventListener("touchmove", e => {
        if (e.target.closest(".sidebar") || e.target.closest(".header")) return;

        if (e.touches.length === 2) {
            e.preventDefault();
            const d = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            sc = Math.min(Math.max(0.05, sc * (d / iDist)), 5);
            iDist = d;
            upT();
        } else if (rdg) {
            e.preventDefault();
            const p = getEP(e);
            upR(p.x, p.y);
        } else if (dg) {
            e.preventDefault();
            px += (e.touches[0].clientX - sx);
            py += (e.touches[0].clientY - sy);
            sx = e.touches[0].clientX;
            sy = e.touches[0].clientY;
            upT();
        }
    }, { passive: false });

    window.addEventListener("touchend", () => {
        dg = false;
        rdg = false;
    });
});
})();
</script>
</body>
</html>
