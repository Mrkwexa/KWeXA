<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KWeXA FX - Square of 9 Secure</title>

<script src="security-check.js"></script>

<style>
:root{--neon-cyan:#00ffcc;--neon-gold:#d4af37;--neon-pink:#ff3399;--neon-purple:#b366ff;--neon-orange:#ff9900;--bg-dark:#000}
body{background:#000;margin:0;overflow:hidden;font-family:sans-serif;touch-action:none;color:white;direction:ltr;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.header{position:fixed;top:0;width:100%;background:rgba(12,12,12,.95);padding:12px 15px;border-bottom:1px solid var(--neon-cyan);z-index:9999;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;backdrop-filter:blur(5px);direction:ltr}
.menu-toggle{background:var(--neon-cyan);border:none;color:#000;padding:6px 15px;border-radius:4px;font-weight:bold;cursor:pointer;font-size:14px;box-shadow:0 0 10px rgba(0,255,204,.3);order:1}
.center-brand-text{color:var(--neon-gold);font-weight:bold;font-size:9px;font-family:monospace;order:2;flex:1;text-align:center;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 5px}
.back-arrow-btn{background:transparent;border:none;color:var(--neon-cyan);font-size:24px;cursor:pointer;transition:.3s;padding:0 5px;display:flex;align-items:center;order:3;text-decoration:none}
.back-arrow-btn:active{transform:scale(.9);color:#fff}
.sidebar{position:fixed;top:0;width:310px;height:100%;background:#0a0a0f;z-index:9999999;transition:.3s;padding:85px 20px 20px 20px;box-sizing:border-box;overflow-y:auto;box-shadow:0 0 20px rgba(0,0,0,.9)}
html[dir="rtl"] .sidebar{right:-320px;border-left:1px solid var(--neon-cyan);direction:rtl}
html[dir="rtl"] .sidebar.active{right:0}
html[dir="rtl"] .close-menu{left:15px;right:auto}
html[dir="ltr"] .sidebar{left:-320px;border-right:1px solid var(--neon-cyan);direction:ltr}
html[dir="ltr"] .sidebar.active{left:0}
html[dir="ltr"] .close-menu{right:15px;left:auto}
.close-menu{position:absolute;top:15px;background:none;border:1px solid var(--neon-cyan);color:var(--neon-cyan);padding:2px 8px;cursor:pointer;border-radius:4px;font-weight:bold}
.menu-item{margin-top:15px;border-bottom:1px solid #222;padding-bottom:15px}
.menu-item label{display:block;color:var(--neon-cyan);font-size:12px;margin-bottom:6px;font-weight:bold;text-align:center}
input,select{background:#0a0a0a;border:1px solid #444;color:#fff;padding:8px;border-radius:5px;font-size:14px;outline:none;width:100%;box-sizing:border-box;text-align:center;font-weight:bold;font-family:monospace}
input:focus,select:focus{border-color:var(--neon-cyan)}
#viewport-maps{position:absolute;top:0;left:0;width:100vw;height:100vh;overflow:hidden;display:block;z-index:10;background:radial-gradient(circle at center,#111 0%,#000 80%)}
.map-area{position:absolute;width:6000px;height:6000px;display:flex;align-items:center;justify-content:center;cursor:grab;left:50%;top:50%;transform:translate(-50%,-50%)}
.map-area:active{cursor:grabbing}
#zoom-layer{position:relative;transform-origin:center;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
canvas{background:transparent;display:block}
#container-sq9{position:relative;display:flex;align-items:center;justify-content:center}
</style>
</head>

<body oncontextmenu="return false;">

<div class="header">
    <button class="menu-toggle" id="btn-menu" data-i18n="btn_menu">☰ ڕێکخستن</button>
    <div class="center-brand-text">KWeXA FX</div>
    <a href="index.html?showHub=true" class="back-arrow-btn">⬅️</a>
</div>

<div class="sidebar" id="sidebar">
    <button class="close-menu" id="btn-close-menu">✕</button>

    <h3 style="color: var(--neon-cyan); text-align: center; border-bottom: 1px dashed #444; padding-bottom: 10px; margin-top: 0;" data-i18n="opt_sq9">🔲 چوارگۆشەی ٩</h3>

    <div id="controls-sq9">
        <div class="menu-item">
            <label style="color:var(--neon-purple);" data-i18n="lbl_sq9_center">سەنتەری خشتەکە (نرخ)</label>
            <input type="number" id="sq9CenterPrice" value="2304" style="border-color:var(--neon-purple);">
        </div>

        <div class="menu-item" style="background: rgba(255,153,0,.05); padding: 10px; border-radius: 5px; border: 1px dashed var(--neon-orange);">
            <label style="color: var(--neon-orange);" data-i18n="lbl_sq9_search">🎯 گەڕان بەدوای نرخ</label>
            <input type="number" id="sq9SearchPrice" data-i18n-ph="ph_sq9_search" placeholder="نموونە: 2350" style="background:#0a0a0a; border-color:var(--neon-orange); color:var(--neon-orange);">
        </div>

        <div class="menu-item">
            <label style="color:var(--neon-purple);" data-i18n="lbl_sq9_step">بڕی هەنگاو (Step)</label>
            <input type="number" id="sq9StepValue" value="1" step="0.5" style="border-color:var(--neon-purple);">
        </div>

        <div class="menu-item">
            <label style="color:var(--neon-purple);" data-i18n="lbl_sq9_size">قەبارەی خشتەکە (ستاندارد)</label>
            <select id="sq9GridCells" style="border-color:var(--neon-purple); color:var(--neon-purple);">
                <option value="9" selected data-i18n="sz_9">٩×٩ (٨١ خانە)</option>
                <option value="11" data-i18n="sz_11">١١×١١ (١٢١ خانە)</option>
                <option value="13" data-i18n="sz_13">١٣×١٣ (١٦٩ خانە)</option>
                <option value="15" data-i18n="sz_15">١٥×١٥ (٢٢٥ خانە)</option>
                <option value="17" data-i18n="sz_17">١٧×١٧ (٢٨٩ خانە)</option>
                <option value="19" data-i18n="sz_19">١٩×١٩ (٣٦١ خانە)</option>
                <option value="21" data-i18n="sz_21">٢١×٢١ (٤٤١ خانە)</option>
                <option value="25" data-i18n="sz_25">٢٥×٢٥ (٦٢٥ خانە)</option>
                <option value="33" data-i18n="sz_33">٣٣×٣٣ (١٠٨٩ خانە)</option>
            </select>
        </div>

        <div class="menu-item" style="border-bottom: none;">
            <label style="color:var(--neon-purple);" data-i18n="lbl_sq9_dir">ئاراستەی بازاڕ</label>
            <select id="sq9TrendDir" style="border-color:var(--neon-purple); color:var(--neon-purple);">
                <option value="up" data-i18n="opt_up">📈 بەرزبوونەوە (+)</option>
                <option value="down" selected data-i18n="opt_down">📉 دابەزین (-)</option>
            </select>
        </div>
    </div>
</div>

<div id="viewport-maps">
    <div class="map-area" id="map">
        <div id="zoom-layer">
            <div id="container-sq9">
                <canvas id="sq9Canvas"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
(() => {
"use strict";

const lexicon = {
    ku: {
        btn_menu: "☰ ڕێکخستن", opt_sq9: "🔲 چوارگۆشەی ٩",
        lbl_sq9_center: "سەنتەری خشتەکە (نرخ)", lbl_sq9_search: "🎯 گەڕان بەدوای نرخ", ph_sq9_search: "نموونە: 2350",
        lbl_sq9_step: "بڕی هەنگاو (Step)", lbl_sq9_size: "قەبارەی خشتەکە (ستاندارد)", lbl_sq9_dir: "ئاراستەی بازاڕ",
        opt_up: "📈 بەرزبوونەوە (+)", opt_down: "📉 دابەزین (-)",
        sz_9: "٩×٩ (٨١ خانە)", sz_11: "١١×١١ (١٢١ خانە)", sz_13: "١٣×١٣ (١٦٩ خانە)", sz_15: "١٥×١٥ (٢٢٥ خانە)", sz_17: "١٧×١٧ (٢٨٩ خانە)", sz_19: "١٩×١٩ (٣٦١ خانە)", sz_21: "٢١×٢١ (٤٤١ خانە)", sz_25: "٢٥×٢٥ (٦٢٥ خانە)", sz_33: "٣٣×٣٣ (١٠٨٩ خانە)"
    },
    ar: {
        btn_menu: "☰ إعدادات", opt_sq9: "🔲 مربع ٩ (Square of 9)",
        lbl_sq9_center: "مركز المصفوفة (السعر)", lbl_sq9_search: "🎯 البحث عن السعر", ph_sq9_search: "مثال: 2350",
        lbl_sq9_step: "قيمة الخطوة (Step)", lbl_sq9_size: "حجم المصفوفة (قياسي)", lbl_sq9_dir: "اتجاه السوق",
        opt_up: "📈 صعود (+)", opt_down: "📉 هبوط (-)",
        sz_9: "٩×٩ (٨١ خلية)", sz_11: "١١×١١ (١٢١ خلية)", sz_13: "١٣×١٣ (١٦٩ خلية)", sz_15: "١٥×١٥ (٢٢٥ خلية)", sz_17: "١٧×١٧ (٢٨٩ خلية)", sz_19: "١٩×١٩ (٣٦١ خلية)", sz_21: "٢١×٢١ (٤٤١ خلية)", sz_25: "٢٥×٢٥ (٦٢٥ خلية)", sz_33: "٣٣×٣٣ (١٠٨٩ خلية)"
    },
    en: {
        btn_menu: "☰ Settings", opt_sq9: "🔲 Square of 9",
        lbl_sq9_center: "Grid Center (Price)", lbl_sq9_search: "🎯 Search Target", ph_sq9_search: "e.g. 2350",
        lbl_sq9_step: "Step Value", lbl_sq9_size: "Grid Size (Standard)", lbl_sq9_dir: "Market Trend",
        opt_up: "📈 UP Trend (+)", opt_down: "📉 DOWN Trend (-)",
        sz_9: "9×9 (81 Cells)", sz_11: "11×11 (121 Cells)", sz_13: "13×13 (169 Cells)", sz_15: "15×15 (225 Cells)", sz_17: "17×17 (289 Cells)", sz_19: "19×19 (361 Cells)", sz_21: "21×21 (441 Cells)", sz_25: "25×25 (625 Cells)", sz_33: "33×33 (1089 Cells)"
    }
};

let currentLang = "ku";
let sc = window.innerWidth < 600 ? 0.35 : 0.6;
let px = 0;
let py = 0;
let dg = false;
let sx = 0;
let sy = 0;
let iDist = 0;

const savedIds = ["sq9CenterPrice", "sq9SearchPrice", "sq9StepValue", "sq9GridCells", "sq9TrendDir"];
const $ = id => document.getElementById(id);

function applyLanguage() {
    try { currentLang = localStorage.getItem("rfx_lang") || "ku"; } catch(e) {}
    document.documentElement.dir = currentLang === "en" ? "ltr" : "rtl";

    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (lexicon[currentLang] && lexicon[currentLang][key]) el.innerHTML = lexicon[currentLang][key];
    });

    document.querySelectorAll("[data-i18n-ph]").forEach(el => {
        const key = el.getAttribute("data-i18n-ph");
        if (lexicon[currentLang] && lexicon[currentLang][key]) el.placeholder = lexicon[currentLang][key];
    });
}

function loadSet() {
    try {
        savedIds.forEach(id => {
            const v = localStorage.getItem("rfx_sq9_" + id);
            const el = $(id);
            if (v !== null && el) el.value = v;
        });
    } catch(e) {}
}

function saveSet() {
    try {
        savedIds.forEach(id => {
            const el = $(id);
            if (el) localStorage.setItem("rfx_sq9_" + id, el.value);
        });
    } catch(e) {}
}

function drawSq9() {
    const canvas = $("sq9Canvas");
    if (!canvas) return;

    const ctx = canvas.getContext("2d");
    const centerPrice = Math.round(parseFloat($("sq9CenterPrice").value)) || 2304;
    const stepVal = parseFloat($("sq9StepValue").value) || 1;
    const trendDir = $("sq9TrendDir").value;
    const searchRaw = parseFloat($("sq9SearchPrice").value);
    const hasSearch = !isNaN(searchRaw);
    const searchPrice = hasSearch ? parseFloat(searchRaw.toFixed(2)) : null;

    let gridCells = parseInt($("sq9GridCells").value) || 9;
    if (gridCells % 2 === 0) gridCells++;

    const cellSize = gridCells > 25 ? 42 : gridCells > 19 ? 46 : 55;
    const gridPixelSize = gridCells * cellSize;
    const radius = ((gridPixelSize / 2) * Math.SQRT2) + 35;
    const baseSize = (radius * 2) + 120;

    canvas.width = baseSize;
    canvas.height = baseSize;
    canvas.style.width = baseSize + "px";
    canvas.style.height = baseSize + "px";
    ctx.clearRect(0, 0, baseSize, baseSize);

    const center = baseSize / 2;
    const gridStartX = center - (gridPixelSize / 2);
    const gridStartY = center - (gridPixelSize / 2);

    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(179,102,255,.3)";
    ctx.beginPath();
    ctx.arc(center, center, radius, 0, 2 * Math.PI);
    ctx.stroke();

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    for (let i = 0; i < 360; i++) {
        const angleRad = Math.PI + (i * Math.PI / 180);
        const cosA = Math.cos(angleRad);
        const sinA = Math.sin(angleRad);

        if (i % 5 === 0) {
            ctx.strokeStyle = "#553388";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(center + radius * cosA, center + radius * sinA);
            ctx.lineTo(center + (radius + 25) * cosA, center + (radius + 25) * sinA);
            ctx.stroke();

            if (i % 15 === 0) {
                ctx.save();
                ctx.translate(center + (radius + 40) * cosA, center + (radius + 40) * sinA);
                ctx.rotate(angleRad + Math.PI / 2);
                ctx.fillStyle = (i % 90 === 0) ? "#b366ff" : "#777";
                ctx.font = "bold 12px Arial";
                ctx.fillText(i + "°", 0, 0);
                ctx.restore();
            }
        } else {
            ctx.strokeStyle = "#1a0d26";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(center + radius * cosA, center + radius * sinA);
            ctx.lineTo(center + (radius + 10) * cosA, center + (radius + 10) * sinA);
            ctx.stroke();
        }
    }

    const grid = Array(gridCells).fill(null).map(() => Array(gridCells).fill(null));
    let x = Math.floor(gridCells / 2);
    let y = Math.floor(gridCells / 2);
    let value = centerPrice;

    const actualStep = trendDir === "up" ? stepVal : -stepVal;
    grid[y][x] = parseFloat(value.toFixed(2));

    const dirs = [[-1, 0], [0, -1], [1, 0], [0, 1]];
    let dirIdx = 0;
    let steps = 1;
    let count = 1;
    const totalCells = gridCells * gridCells;

    while (count < totalCells) {
        for (let i = 0; i < 2; i++) {
            for (let j = 0; j < steps; j++) {
                if (count >= totalCells) break;

                x += dirs[dirIdx][0];
                y += dirs[dirIdx][1];
                value = parseFloat((value + actualStep).toFixed(2));

                if (x >= 0 && x < gridCells && y >= 0 && y < gridCells) {
                    grid[y][x] = value;
                }

                count++;
            }

            dirIdx = (dirIdx + 1) % 4;
        }

        steps++;
    }

    const centerIdx = Math.floor(gridCells / 2);

    for (let row = 0; row < gridCells; row++) {
        for (let col = 0; col < gridCells; col++) {
            const num = grid[row][col];
            if (num === null) continue;

            const cellX = gridStartX + col * cellSize;
            const cellY = gridStartY + row * cellSize;

            const isCenter = row === centerIdx && col === centerIdx;
            const isCross =
                row === centerIdx ||
                col === centerIdx ||
                Math.abs(row - centerIdx) === Math.abs(col - centerIdx);

            const isTarget = hasSearch && Math.abs(num - searchPrice) < 0.0001;

            let bgCol = "#050505";
            let textCol = "#777";
            let borderCol = "#222";
            let borderW = 1;

            if (isTarget) {
                bgCol = "rgba(255,153,0,.9)";
                textCol = "#fff";
                borderCol = "#fff";
                borderW = 3;
            } else if (isCenter) {
                bgCol = "#fff";
                textCol = "#000";
                borderCol = "#fff";
                borderW = 2;
            } else if (isCross) {
                bgCol = "#1a0033";
                textCol = "#b366ff";
                borderCol = "rgba(179,102,255,.8)";
                borderW = 2;
            }

            ctx.fillStyle = bgCol;
            ctx.fillRect(cellX, cellY, cellSize, cellSize);

            ctx.strokeStyle = borderCol;
            ctx.lineWidth = borderW;
            ctx.strokeRect(cellX, cellY, cellSize, cellSize);

            ctx.fillStyle = textCol;
            ctx.font = isTarget ? `bold ${cellSize * .43}px Arial` : `bold ${cellSize * .31}px Arial`;

            if (isTarget || isCenter || isCross) {
                ctx.shadowBlur = 10;
                ctx.shadowColor = isTarget ? "#ff9900" : (isCenter ? "#fff" : "#b366ff");
            }

            const shown = Number.isInteger(num) ? String(num) : num.toFixed(2);
            ctx.fillText(shown, cellX + cellSize / 2, cellY + cellSize / 2 + 2);
            ctx.shadowBlur = 0;
        }
    }
}

function upT() {
    $("zoom-layer").style.transform = `translate(${px}px, ${py}px) scale(${sc})`;
}

function getEP(e) {
    return e.touches && e.touches.length > 0
        ? {x: e.touches[0].clientX, y: e.touches[0].clientY}
        : {x: e.clientX, y: e.clientY};
}

function initEvents() {
    $("btn-menu").addEventListener("click", e => {
        e.stopPropagation();
        $("sidebar").classList.toggle("active");
    });

    $("btn-close-menu").addEventListener("click", () => {
        $("sidebar").classList.remove("active");
    });

    savedIds.forEach(id => {
        const el = $(id);
        if (!el) return;

        el.addEventListener("change", () => {
            saveSet();
            drawSq9();
        });

        if (el.tagName === "INPUT") {
            el.addEventListener("input", () => {
                saveSet();
                drawSq9();
            });
        }
    });

    const vM = $("viewport-maps");

    vM.addEventListener("mousedown", e => {
        if (e.target.closest(".sidebar") || e.target.closest(".header")) return;

        const p = getEP(e);
        dg = true;
        sx = p.x - px;
        sy = p.y - py;
        vM.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", e => {
        if (!dg) return;

        const p = getEP(e);
        px = p.x - sx;
        py = p.y - sy;
        upT();
    });

    window.addEventListener("mouseup", () => {
        dg = false;
        vM.style.cursor = "grab";
    });

    vM.addEventListener("wheel", e => {
        if (e.target.closest(".sidebar") || e.target.closest(".header")) return;

        e.preventDefault();
        sc += e.deltaY * -0.001;
        sc = Math.min(Math.max(0.1, sc), 5);
        upT();
    }, {passive: false});

    vM.addEventListener("touchstart", e => {
        if (e.target.closest(".sidebar") || e.target.closest(".header")) return;

        if (e.touches.length === 2) {
            dg = false;
            iDist = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        } else {
            const p = getEP(e);
            dg = true;
            sx = p.x - px;
            sy = p.y - py;
        }
    }, {passive: false});

    vM.addEventListener("touchmove", e => {
        if (e.target.closest(".sidebar") || e.target.closest(".header")) return;

        if (e.touches.length === 2) {
            e.preventDefault();

            const d = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );

            sc = Math.min(Math.max(0.1, sc * (d / iDist)), 5);
            iDist = d;
            upT();
        } else if (dg) {
            e.preventDefault();

            const p = getEP(e);
            px = p.x - sx;
            py = p.y - sy;
            upT();
        }
    }, {passive: false});

    window.addEventListener("touchend", () => {
        dg = false;
    });

    document.addEventListener("contextmenu", e => e.preventDefault());

    document.addEventListener("keydown", e => {
        const key = String(e.key || "").toLowerCase();

        if (
            key === "f12" ||
            (e.ctrlKey && e.shiftKey && ["i", "j", "c"].includes(key)) ||
            (e.ctrlKey && ["u", "s"].includes(key))
        ) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
    }, true);
}

document.addEventListener("DOMContentLoaded", () => {
    applyLanguage();
    loadSet();
    initEvents();
    px = 0;
    py = 0;
    upT();
    drawSq9();
});

})();
</script>
</body>
</html>
